services:
  db:
    image: postgres:17.9-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-forum}
      POSTGRES_USER: ${DB_USERNAME:-forum}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forum}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-forum}
      DB_USERNAME: ${DB_USERNAME:-forum}
      DB_PASSWORD: ${DB_PASSWORD:-forum}
    depends_on:
      db:
        condition: service_healthy
