spring.application.name=forum

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/forum}
spring.datasource.username=${DB_USERNAME:forum}
spring.datasource.password=${DB_PASSWORD:forum}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

spring.liquibase.enabled=true
spring.liquibase.change-log=db/changelog/forum.master.xml


springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.doc-expansion=false
springdoc.swagger-ui.groups-order=asc
springdoc.swagger-ui.default-models-expand-depth=0
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operations-sorter=alpha